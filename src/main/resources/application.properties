# Application Configuration
# Environment-specific properties

# HTTP Configuration
http.port=8086

# AI Service Configuration
# For OpenAI
ai.service.url=https://api.openai.com/v1/chat/completions
ai.service.key=${OPENAI_API_KEY}
ai.service.model=gpt-3.5-turbo
ai.service.temperature=0.7

# For Azure OpenAI (alternative)
# ai.service.url=https://{resource}.openai.azure.com/openai/deployments/{deployment-id}/chat/completions
# ai.service.api_version=2024-02-15-preview
# ai.service.key=${AZURE_OPENAI_KEY}

# Database Configuration (when using real database)
db.host=localhost
db.port=5432
db.name=customer_support
db.user=${DB_USER}
db.password=${DB_PASSWORD}

# Cache Configuration
cache.ttl=3600

# Logging Configuration
logging.level=INFO

# Security
security.basic.enabled=false
security.token.enabled=false
security.api.key=${API_KEY}

# CloudHub Configuration
cloudhub.username=${CLOUDHUB_USERNAME}
cloudhub.password=${CLOUDHUB_PASSWORD}
cloudhub.environment=Production

# Application Info
app.name=AI-Powered Customer Support API
app.version=1.0.0
app.environment=production
